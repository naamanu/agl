site_name: AgentLang
site_description: A tiny DSL for agentic workflows — define agents, typed tasks, declarative workflows, and pipelines.
site_url: https://nanamanu.com/agl
repo_url: https://github.com/naamanu/agl
repo_name: naamanu/agl
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
nav:
  - Home: index.md
  - Tutorial:
      - Quick Start: tutorial/quickstart.md
      - Your First Pipeline: tutorial/first-pipeline.md
  - Concepts:
      - Agents: concepts/agents.md
      - Tasks: concepts/tasks.md
      - Workflows: concepts/workflows.md
      - Pipelines: concepts/pipelines.md
      - The Type System: concepts/types.md
      - Parallel Execution: concepts/parallel.md
      - Retry & Fallback: concepts/retry.md
      - Error Handling: concepts/error-handling.md
      - Testing: concepts/testing.md
      - Plugins: concepts/plugins.md
      - Observability: concepts/observability.md
  - Reference:
      - Language Reference: reference/language.md
      - CLI Reference: reference/cli.md
      - Adapters: reference/adapters.md
      - Runtime & Typing: reference/runtime.md
      - Examples: reference/examples.md
  - Advanced:
      - Formal Semantics: advanced/semantics.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

copyright: Copyright &copy; 2026 Nana Adjei Manu

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/naamanu/agl
      name: GitHub

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js
